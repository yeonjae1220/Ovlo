apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ovlo-media-pvc
  namespace: ovlo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: ovlo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      nodeSelector:
        project2: ovlo
      containers:
        - name: app
          image: ghcr.io/yeonjae1220/ovlo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/ovlo"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ovlo"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATASOURCE_DRIVER
              value: "org.postgresql.Driver"
            - name: JPA_DIALECT
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: REDIS_PASSWORD
            - name: FLYWAY_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: JWT_SECRET
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: CORS_ALLOWED_ORIGINS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: ADMIN_PASSWORD_BCRYPT
            # lab.mungji 콘솔 집계용 서비스 토큰 — 미설정 시 /api/internal/** 차단
            - name: CONSOLE_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: CONSOLE_INTERNAL_TOKEN
            - name: LAB_FEEDBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: LAB_FEEDBACK_TOKEN
            # 이메일(SMTP) — optional:true. 시크릿에 키가 없으면 env 미설정 → spring.mail.host 부재 →
            # LogEmailSenderAdapter 폴백. 4개 키가 모두 채워지면 SmtpEmailSenderAdapter(Gmail) 활성화.
            - name: SPRING_MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: SPRING_MAIL_HOST
                  optional: true
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: MAIL_USERNAME
                  optional: true
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: MAIL_PASSWORD
                  optional: true
            - name: MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: ovlo-secret
                  key: MAIL_FROM
                  optional: true
            # nginx-ingress 파드의 IP에서 온 요청만 X-Real-IP를 신뢰 (스푸핑 방지).
            # k3s/flannel 기본 파드 CIDR — 운영 환경에서 `kubectl get pods -n kube-system -o wide`로
            # 실제 ingress-nginx 파드 대역을 확인해 필요 시 갱신할 것 (CIDR 표기 지원).
            - name: TRUSTED_PROXY_IPS
              value: "127.0.0.1,::1,10.42.0.0/16"
          volumeMounts:
            - name: media-data
              mountPath: /tmp/ovlo-media
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: media-data
          persistentVolumeClaim:
            claimName: ovlo-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: ovlo
spec:
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
