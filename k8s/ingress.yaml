apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ovlo-ingress
  namespace: ovlo
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/upgrade: "websocket"
    nginx.ingress.kubernetes.io/connection: "Upgrade"
spec:
  ingressClassName: nginx
  rules:
    - host: ovlo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          # 백엔드 Thymeleaf admin (formLogin 세션). 최장 prefix 매칭이라
          # /admin 만 백엔드로, 나머지 / 는 frontend 로 유지된다.
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
