name: CI/CD Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yeonjae1220/ovlo

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test with Gradle
        run: ./gradlew build --no-daemon

  build-and-push:
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Get short SHA for image tag
        id: sha
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-push-frontend:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get short SHA for image tag
        id: sha
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy to Lenovo Server
    # self-hosted runner가 lenovo에서 직접 실행 — SSH 불필요
    runs-on: [self-hosted, homelab]
    needs: [build-and-push, build-and-push-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # NetworkPolicy는 이미지와 무관하므로 매 배포 시 최신 상태로 적용
      # (egress 587=SMTP 등 정책 변경이 자동 반영되도록 — 과거 수동 적용 누락 방지)
      - name: Apply network policies
        run: sudo kubectl apply -f k8s/network-policy.yaml -n ovlo

      - name: Apply k8s secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_BCRYPT: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
          CONSOLE_INTERNAL_TOKEN: ${{ secrets.CONSOLE_INTERNAL_TOKEN }}
          # 이메일(SMTP) — 미설정 시 빈 문자열. 아래에서 비어있지 않을 때만 시크릿에 추가한다.
          SPRING_MAIL_HOST: ${{ secrets.SPRING_MAIL_HOST }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          # 메일 키는 값이 있을 때만 추가 — 빈 문자열 키를 만들면 spring.mail.host="" 가
          # "설정됨"으로 오판되어 SMTP 어댑터가 빈 호스트로 활성화되는 함정을 막는다.
          MAIL_ARGS=()
          [ -n "${SPRING_MAIL_HOST}" ] && MAIL_ARGS+=(--from-literal=SPRING_MAIL_HOST="${SPRING_MAIL_HOST}")
          [ -n "${MAIL_USERNAME}" ]    && MAIL_ARGS+=(--from-literal=MAIL_USERNAME="${MAIL_USERNAME}")
          [ -n "${MAIL_PASSWORD}" ]    && MAIL_ARGS+=(--from-literal=MAIL_PASSWORD="${MAIL_PASSWORD}")
          [ -n "${MAIL_FROM}" ]        && MAIL_ARGS+=(--from-literal=MAIL_FROM="${MAIL_FROM}")

          sudo kubectl create secret generic ovlo-secret \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=REDIS_PASSWORD="${REDIS_PASSWORD}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
            --from-literal=CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS}" \
            --from-literal=ADMIN_EMAIL="${ADMIN_EMAIL}" \
            --from-literal=ADMIN_PASSWORD_BCRYPT="${ADMIN_PASSWORD_BCRYPT}" \
            --from-literal=CONSOLE_INTERNAL_TOKEN="${CONSOLE_INTERNAL_TOKEN}" \
            "${MAIL_ARGS[@]}" \
            -n ovlo --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Pull and deploy images
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          FRONTEND_IMAGE_TAG: ${{ needs.build-and-push-frontend.outputs.image-tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # ── Backend ─────────────────────────────────────────────────────────
          sudo k3s ctr images pull \
            --user "yeonjae1220:${GH_TOKEN}" \
            ghcr.io/yeonjae1220/ovlo:${IMAGE_TAG}

          sudo kubectl set image deployment/app \
            app=ghcr.io/yeonjae1220/ovlo:${IMAGE_TAG} \
            -n ovlo

          sudo kubectl rollout status deployment/app \
            -n ovlo --timeout=300s

          # ── Frontend ────────────────────────────────────────────────────────
          sudo k3s ctr images pull \
            --user "yeonjae1220:${GH_TOKEN}" \
            ghcr.io/yeonjae1220/ovlo-frontend:${FRONTEND_IMAGE_TAG}

          sudo kubectl set image deployment/frontend \
            frontend=ghcr.io/yeonjae1220/ovlo-frontend:${FRONTEND_IMAGE_TAG} \
            -n ovlo

          sudo kubectl rollout status deployment/frontend \
            -n ovlo --timeout=300s

      - name: Notify deploy result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backend:  ghcr.io/yeonjae1220/ovlo:${{ needs.build-and-push.outputs.image-tag }}"
            echo "✅ Frontend: ghcr.io/yeonjae1220/ovlo-frontend:${{ needs.build-and-push-frontend.outputs.image-tag }}"
          else
            echo "❌ Deploy failed. Rollback with:"
            echo "sudo kubectl set image deployment/app      app=ghcr.io/yeonjae1220/ovlo:<PREV_SHA_TAG> -n ovlo"
            echo "sudo kubectl set image deployment/frontend frontend=ghcr.io/yeonjae1220/ovlo-frontend:<PREV_SHA_TAG> -n ovlo"
          fi
