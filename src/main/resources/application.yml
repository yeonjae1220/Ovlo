spring:
  application:
    name: Ovlo

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ovlo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
        jdbc:
          time_zone: UTC

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:55MB}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console


cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

admin:
  email: ${ADMIN_EMAIL:admin@ovlo.local}
  password:
    bcrypt: ${ADMIN_PASSWORD_BCRYPT:$2a$10$placeholder-must-be-overridden-in-prod}

console:
  # lab.mungji мҪҳмҶ” м§‘кі„мҡ© м„ңл№„мҠӨ нҶ нҒ°. лҜём„Өм • мӢң /api/internal/** м „л¶Җ м°ЁлӢЁ(fail-closed).
  internal-token: ${CONSOLE_INTERNAL_TOKEN:}

server:
  servlet:
    session:
      timeout: 15m
      cookie:
        http-only: true
        secure: true
        same-site: strict

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-token-ttl-minutes: ${JWT_REFRESH_TTL_MINUTES:43200}

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo

ovlo:
  storage:
    local:
      path: ${STORAGE_LOCAL_PATH:/tmp/ovlo-media}
  rate-limit:
    login-limit: ${RATE_LIMIT_LOGIN:10}
    refresh-limit: ${RATE_LIMIT_REFRESH:30}
    signup-limit: ${RATE_LIMIT_SIGNUP:5}
    search-limit: ${RATE_LIMIT_SEARCH:100}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:600}
  # мӢ лў° н”„лЎқмӢң IP лӘ©лЎқ вҖ” мқҙ мЈјмҶҢм—җм„ң мҳЁ мҡ”мІӯл§Ң X-Real-IP н—ӨлҚ”лҘј мӢ лў°
  # Docker лӮҙл¶Җ nginx: 172.x.x.x, лЎңм»¬ к°ңл°ң: 127.0.0.1/::1
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:127.0.0.1,::1}

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  h2:
    console:
      enabled: false

  # мқҙл©”мқј(SMTP) вҖ” hostлҠ” мқҳлҸ„м ҒмңјлЎң yamlм—җ л‘җм§Җ м•ҠлҠ”лӢӨ.
  # SPRING_MAIL_HOST(мҳҲ: smtp.gmail.com)к°Җ мЈјмһ…лҗ  л•Ңл§Ң SmtpEmailSenderAdapterк°Җ нҷңм„ұнҷ”лҗҳкі ,
  # лҜём„Өм •мқҙл©ҙ spring.mail.host л¶Җмһ¬ вҶ’ LogEmailSenderAdapter(нҸҙл°ұ)к°Җ лҸҷмһ‘н•ңлӢӨ.
  # (л№Ҳ л¬ёмһҗм—ҙ кё°ліёк°’мқ„ мЈјл©ҙ ConditionalOnPropertyк°Җ "м„Өм •лҗЁ"мңјлЎң мҳӨнҢҗн•ҳлҜҖлЎң кёҲм§Җ)
  mail:
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# GmailмқҖ Fromмқ„ мқёмҰқ кі„м •мңјлЎң к°•м ңн•ҳлҜҖлЎң MAIL_FROMмқҖ Gmail мЈјмҶҢ(лҳҗлҠ” 'Send mail as' лі„м№ӯ)лЎң м„Өм •
ovlo:
  mail:
    from: ${MAIL_FROM:no-reply@ovlo.app}

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.hibernate.SQL: WARN
