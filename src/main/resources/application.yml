spring:
  application:
    name: Ovlo

  # 로컬 개발 기본 프로파일. 운영은 k8s 가 SPRING_PROFILES_ACTIVE=prod 로 덮어쓴다(env > yaml).
  profiles:
    active: local

  threads:
    virtual:
      enabled: true

  # datasource / jpa.ddl-auto / dialect / h2.console 는 프로파일별로 분리됨:
  #   - local  : 아래 on-profile=local 문서 (H2)
  #   - prod   : 아래 on-profile=prod 문서 (PostgreSQL)
  #   - test   : src/test/resources/application-test.yml (H2)
  # 공유(default) 문서에는 DB 접속 정보를 두지 않아 prod 가 H2 를 상속하지 않게 한다.
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:55MB}


cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

admin:
  email: ${ADMIN_EMAIL:admin@ovlo.local}
  password:
    bcrypt: ${ADMIN_PASSWORD_BCRYPT:$2a$10$placeholder-must-be-overridden-in-prod}

console:
  # lab.mungji 콘솔 집계용 서비스 토큰. 미설정 시 /api/internal/** 전부 차단(fail-closed).
  internal-token: ${CONSOLE_INTERNAL_TOKEN:}

server:
  servlet:
    session:
      timeout: 15m
      cookie:
        http-only: true
        secure: true
        same-site: strict

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-token-ttl-minutes: ${JWT_REFRESH_TTL_MINUTES:43200}

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo

ovlo:
  storage:
    local:
      path: ${STORAGE_LOCAL_PATH:/tmp/ovlo-media}
  rate-limit:
    login-limit: ${RATE_LIMIT_LOGIN:10}
    refresh-limit: ${RATE_LIMIT_REFRESH:30}
    signup-limit: ${RATE_LIMIT_SIGNUP:5}
    search-limit: ${RATE_LIMIT_SEARCH:100}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:600}
  # 신뢰 프록시 IP 목록 — 이 주소에서 온 요청만 X-Real-IP 헤더를 신뢰
  # Docker 내부 nginx: 172.x.x.x, 로컬 개발: 127.0.0.1/::1
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:127.0.0.1,::1}

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── local 프로파일 전용: H2 (in-memory, PostgreSQL 호환 모드) ──────────
# 로컬 개발 / 슬라이스 테스트 기본 DB. 운영은 아래 prod 문서의 PostgreSQL.
# H2 를 공유 문서가 아닌 이 프로파일 문서에 격리해, prod 와 같은 블록에서
# 함께 수정되는 사고를 막는다.
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ovlo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  h2:
    console:
      enabled: false

  # 이메일(SMTP) — host는 의도적으로 yaml에 두지 않는다.
  # SPRING_MAIL_HOST(예: smtp.gmail.com)가 주입될 때만 SmtpEmailSenderAdapter가 활성화되고,
  # 미설정이면 spring.mail.host 부재 → LogEmailSenderAdapter(폴백)가 동작한다.
  # (빈 문자열 기본값을 주면 ConditionalOnProperty가 "설정됨"으로 오판하므로 금지)
  mail:
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Gmail은 From을 인증 계정으로 강제하므로 MAIL_FROM은 Gmail 주소(또는 'Send mail as' 별칭)로 설정
ovlo:
  mail:
    from: ${MAIL_FROM:no-reply@ovlo.app}

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.hibernate.SQL: WARN
