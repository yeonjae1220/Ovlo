spring:
  application:
    name: Ovlo

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ovlo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:55MB}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console


cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-token-ttl-minutes: ${JWT_REFRESH_TTL_MINUTES:10080}

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo

ovlo:
  storage:
    local:
      path: ${STORAGE_LOCAL_PATH:/tmp/ovlo-media}
  rate-limit:
    login-limit: ${RATE_LIMIT_LOGIN:10}
    refresh-limit: ${RATE_LIMIT_REFRESH:30}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:600}
  # 신뢰 프록시 IP 목록 — 이 주소에서 온 요청만 X-Real-IP 헤더를 신뢰
  # Docker 내부 nginx: 172.x.x.x, 로컬 개발: 127.0.0.1/::1
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:127.0.0.1,::1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        # 운영 환경에서는 health만 공개; metrics/prometheus는 내부 네트워크 전용으로 별도 보호 필요
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    me.yeonjae.ovlo: INFO
    org.hibernate.SQL: WARN
