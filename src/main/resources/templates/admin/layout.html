<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle, activePage)"
      lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' — Ovlo Admin'">Ovlo Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
      --sidebar-w: 230px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-brand {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-nav { flex: 1; padding: 10px 0; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s, background 0.15s;
    }

    .sidebar-nav a:hover { color: var(--text); background: var(--surface-2); }
    .sidebar-nav a.active { color: var(--accent); background: rgba(88,166,255,0.08); border-left: 2px solid var(--accent); }
    .nav-icon { width: 16px; text-align: center; font-size: 14px; }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }

    .sidebar-footer a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-footer a:hover { color: var(--danger); }

    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

    .topbar { padding: 20px 28px 0; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }

    .page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

    .content { padding: 0 28px 48px; flex: 1; }

    .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 18px; font-size: 13px; border: 1px solid; }
    .flash-success { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.3); color: var(--success); }
    .flash-error   { background: rgba(248,81,73,0.1);  border-color: rgba(248,81,73,0.3);  color: var(--danger); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .card-title { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; color: var(--accent); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-admin    { background: rgba(88,166,255,0.15);  color: var(--accent); }
    .badge-member   { background: rgba(139,148,158,0.15); color: var(--text-muted); }
    .badge-active   { background: rgba(63,185,80,0.15);   color: var(--success); }
    .badge-suspended{ background: rgba(248,81,73,0.15);   color: var(--danger); }
    .badge-pending  { background: rgba(210,153,34,0.15);  color: var(--warning); }
    .badge-deleted  { background: rgba(248,81,73,0.08);   color: var(--text-muted); }

    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 5px; border: 1px solid transparent; font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-danger { background: transparent; color: var(--danger); border-color: rgba(248,81,73,0.3); }
    .btn-danger:hover { background: rgba(248,81,73,0.1); }
    .btn-warning { background: transparent; color: var(--warning); border-color: rgba(210,153,34,0.3); }
    .btn-warning:hover { background: rgba(210,153,34,0.1); }
    .btn-sm { padding: 3px 9px; font-size: 11px; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 14px; font-weight: 600; }

    .pagination { display: flex; align-items: center; gap: 5px; margin-top: 18px; justify-content: center; }
    .page-link { padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; font-size: 12px; transition: all 0.15s; }
    .page-link:hover { border-color: var(--accent); color: var(--accent); }
    .page-link.active { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .page-link.disabled { pointer-events: none; opacity: 0.3; }

    .inline-form { display: inline; }

    .text-muted { color: var(--text-muted); font-size: 12px; }
    .mb-3 { margin-bottom: 12px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">Ovlo</div>
    <div class="brand-sub">Admin Console</div>
  </div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}" th:class="${activePage == 'dashboard'} ? 'active' : ''">
      <span class="nav-icon">▤</span> 대시보드
    </a>
    <a th:href="@{/admin/members}" th:class="${activePage == 'members'} ? 'active' : ''">
      <span class="nav-icon">◎</span> 멤버 관리
    </a>
    <a th:href="@{/admin/posts}" th:class="${activePage == 'posts'} ? 'active' : ''">
      <span class="nav-icon">▦</span> 게시글 관리
    </a>
    <a th:href="@{/admin/boards}" th:class="${activePage == 'boards'} ? 'active' : ''">
      <span class="nav-icon">▩</span> 게시판 목록
    </a>
    <a th:href="@{/admin/universities}" th:class="${activePage == 'universities'} ? 'active' : ''">
      <span class="nav-icon">◈</span> 대학 목록
    </a>
  </nav>
  <div class="sidebar-footer">
    <!-- MEDIUM-5 fix: GET 로그아웃 → POST form (CSRF 공격으로 강제 로그아웃 방지) -->
    <form th:action="@{/admin/logout}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:12px; display:flex; align-items:center; gap:8px; padding:0; font-family:inherit;">
        <span>⏻</span> 로그아웃
      </button>
    </form>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 class="page-title" th:text="${pageTitle}">대시보드</h1>
  </div>
  <div class="content">
    <div th:if="${successMessage}" class="flash flash-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="flash flash-error"   th:text="${errorMessage}"></div>
    <th:block th:replace="${content}"/>
  </div>
</div>

</body>
</html>
