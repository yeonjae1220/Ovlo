<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Ovlo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --accent-hover: #79c0ff; --danger: #f85149;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 360px; padding: 0 16px; }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-name { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
    .form-control { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s; }
    .form-control:focus { border-color: var(--accent); }
    .btn-submit { width: 100%; padding: 10px; margin-top: 6px; background: var(--accent); color: #0d1117; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: var(--accent-hover); }
    .error-msg { padding: 9px 12px; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 6px; color: var(--danger); font-size: 12px; margin-bottom: 16px; }
    .logout-msg { padding: 9px 12px; background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); border-radius: 6px; color: var(--accent); font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Ovlo</div>
    <div class="brand-sub">Admin Console</div>
  </div>
  <div class="card">
    <h2 class="card-title">로그인</h2>
    <div th:if="${param.error}"  class="error-msg">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    <div th:if="${param.logout}" class="logout-msg">로그아웃되었습니다.</div>
    <form th:action="@{/admin/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label" for="username">이메일</label>
        <input class="form-control" type="email" id="username" name="username" placeholder="admin@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" type="submit">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
