<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::body}, '대시보드', 'dashboard')}"
      lang="ko">
<body>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">전체 멤버</div>
    <div class="stat-value" th:text="${stats.totalMembers()}">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">전체 게시판</div>
    <div class="stat-value" th:text="${stats.totalBoards()}">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">전체 게시글</div>
    <div class="stat-value" th:text="${stats.totalPosts()}">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">전체 대학</div>
    <div class="stat-value" th:text="${stats.totalUniversities()}">0</div>
  </div>
</div>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
  <div class="card">
    <div class="card-title">빠른 이동</div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <a th:href="@{/admin/members}" class="btn btn-ghost" style="justify-content:flex-start;">◎ 멤버 관리</a>
      <a th:href="@{/admin/posts}"   class="btn btn-ghost" style="justify-content:flex-start;">▦ 게시글 관리</a>
      <a th:href="@{/admin/boards}"  class="btn btn-ghost" style="justify-content:flex-start;">▩ 게시판 목록</a>
      <a th:href="@{/admin/universities}" class="btn btn-ghost" style="justify-content:flex-start;">◈ 대학 목록</a>
    </div>
  </div>
  <div class="card">
    <div class="card-title">현황 요약</div>
    <div style="font-size:13px; line-height:2; color:var(--text-muted);">
      <div>멤버: <span style="color:var(--text); font-weight:600;" th:text="${stats.totalMembers()}">0</span>명</div>
      <div>게시판: <span style="color:var(--text); font-weight:600;" th:text="${stats.totalBoards()}">0</span>개</div>
      <div>게시글: <span style="color:var(--text); font-weight:600;" th:text="${stats.totalPosts()}">0</span>개</div>
      <div>대학: <span style="color:var(--text); font-weight:600;" th:text="${stats.totalUniversities()}">0</span>개</div>
    </div>
  </div>
</div>

</body>
</html>
